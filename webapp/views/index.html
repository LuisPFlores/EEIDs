<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EEIDS Web App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 12px; padding: 48px 56px; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .logo { width: 56px; height: 56px; margin: 0 auto 24px; }
    h1 { font-size: 1.6rem; color: #111827; margin-bottom: 8px; }
    p { color: #6b7280; font-size: 0.95rem; margin-bottom: 32px; line-height: 1.5; }
    .btn { display: inline-block; background: #0078d4; color: #fff; padding: 12px 32px; border-radius: 6px; text-decoration: none; font-size: 0.95rem; font-weight: 600; transition: background 0.2s; }
    .btn:hover { background: #005fa3; }
    .providers { margin-top: 24px; font-size: 0.8rem; color: #9ca3af; }
  </style>
</head>
<body>
  <div class="card">
    <!-- Microsoft logo placeholder -->
    <svg class="logo" viewBox="0 0 23 23" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="11" height="11" fill="#F25022"/>
      <rect x="12" width="11" height="11" fill="#7FBA00"/>
      <rect y="12" width="11" height="11" fill="#00A4EF"/>
      <rect x="12" y="12" width="11" height="11" fill="#FFB900"/>
    </svg>
    <h1>Welcome</h1>
    <p>Sign in to access your account. External users can register with email, Google, or a Microsoft account.</p>
    <a class="btn" href="/auth/login">Sign in</a>
    <p class="providers">Supported: Email &middot; Google &middot; Microsoft Account</p>
  </div>
</body>
</html>
